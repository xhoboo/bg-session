<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F4F1EA" />
    <title>BG Session — Board Game Meetups in Indonesia</title>
    <meta name="description" content="Host & join board game meetups in Indonesia. Find your next table." />
    <!-- Generic link-preview card (fallback). Shared /sessions/:id links get
         per-session Open Graph tags injected server-side by api/session-preview. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BG Session" />
    <meta property="og:title" content="BG Session — Board Game Meetups in Indonesia" />
    <meta property="og:description" content="Host & join board game meetups in Indonesia. Find your next table." />
    <meta property="og:url" content="https://bg-session.vercel.app/" />
    <meta property="og:image" content="https://bg-session.vercel.app/api/session-image" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BG Session — Board Game Meetups in Indonesia" />
    <meta name="twitter:description" content="Host & join board game meetups in Indonesia. Find your next table." />
    <meta name="twitter:image" content="https://bg-session.vercel.app/api/session-image" />
    <!-- Loaded as an external file (not inline) so the CSP can keep a strict
         script-src 'self'. Runs before first paint to avoid a theme flash. -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
